<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tela de login com bootstrap</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body class="bg-light d-flex align-items-center justify-content-center vh-100">

<main class="container">
        <div class="row justify-content-center">
            <div class="col-12 col-md-6 col-lg-4">
                <div class="card shadow p-4">
               <h2 id="titulo" class="text-center mb-4">Login</h2>

                    <form id="form-login">

                        <div class="form-floating mb-3">
                            <input type="email" class="form-control" id="email" placeholder="Email" required>
                            <label for="email">Email</label>
                        </div>

                        <div class="form-floating mb-3">
                            <input type="password" class="form-control" id="senha" placeholder="Senha" required>
                            <label for="senha">Senha</label>
                        </div>  
                                 <button type="submit" class="btn btn-primary w-100" id="botao">
                            Entrar
                        </button>
                    </form>
                    
                    <div id="mensagem" class="mt-3 text-center"></div>

                    <div class="text-center mt-3">
                        <small id="toggle" class="text-primary" style="cursor: pointer;">
                            Não tem conta? Cadastre-se
                        </small>
                    </div>

                    <div id= "esqueci" class="text-center mt-3">
                        <small id="toggle" class="text-primary" style="cursor: pointer;">
                            Esqueci minha senha
                        </small>
                    </div>

                </div>

            </div>
        </div>
    </main>

    <script src="script.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    
</body>

</html>
